schema_version: "2d.1"
scenario_id: S18_approval_resume_operation_id
category: decision_trace
tags: [smoke, contract_edge, trace]
source: committed
input:
  subject: Offert laddbox
  message_text: Jag vill ha offert på laddbox.
  sender:
    name: Anna Svensson
    email: anna@example.com
tenant:
  auto_actions: {}
  internal_notification_email: ops@example.com
  email_signature_name: Krowolf AB
  followups_enabled: true
ai:
  mode: fixture_ai
  fixtures: {}
pipeline:
  pre_seed:
    - processor: classification_processor
      result:
        payload:
          detected_job_type: lead
          confidence: 0.9
          reasons: [keyword]
    - processor: entity_extraction_processor
      result:
        payload:
          entities:
            customer_name: Anna Svensson
            email: anna@example.com
          confidence: 0.85
    - processor: lead_analyzer_processor
      result:
        payload:
          service_profile_type: ev_charger_installation
          generated_question_message: Kan du berätta mer om placering och huvudsäkring?
          profile_missing_fields: [address]
    - processor: lead_processor
      result:
        payload:
          lead_score: 70
          priority: medium
          routing: crm_update
          confidence: 0.85
    - processor: decisioning_processor
      result:
        payload:
          decision: auto_route
          decisioning_recommendation: auto_route
          confidence: 0.85
    - processor: policy_processor
      result:
        payload:
          decision: auto_execute
          policy_authorization: execution_allowed
          detected_job_type: lead
          recommended_next_step: action_dispatch
  steps:
    - run: dispatch
    - run: approve_action
      approval_index: 0
expect:
  decision_trace:
    required_types:
      - action_authorization
      - action_approval_resolution
      - execution_intent
      - execution_outcome
    operation_id_stable: true
    two_pipeline_runs: true
  safety:
    real_external_calls: 0
    telemetry:
      fake_adapter_calls:
        min: 1
      execution_function_calls:
        min: 1
