[pytest]
testpaths = tests
markers =
    pg_eval: PostgreSQL evaluation harness tests (requires EVAL_DATABASE_URL)
    integration_db: PostgreSQL integration tests (requires DATABASE_URL)
    monday_live: Real Monday.com API tests (requires RUN_MONDAY_LIVE_TESTS=yes and MONDAY_API_KEY; live test count currently 0)
    live_gmail_eval: Live Gmail E2E eval tests (requires explicit opt-in; excluded from release gate)
    live_llm_eval: Live LLM E2E eval tests (requires explicit opt-in; excluded from release gate)
    live_e2e_eval: Full live E2E eval tests (requires explicit opt-in; excluded from release gate)
