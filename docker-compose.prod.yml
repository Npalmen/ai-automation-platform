services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - ./storage:/app/storage
    expose:
      - "8000"

  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: ai_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
