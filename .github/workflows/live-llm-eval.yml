name: Live LLM Eval (2F.3)

on:
  workflow_dispatch:
    inputs:
      confirm_live_llm:
        description: "Select READINESS_ONLY or RUN_LLM_S01"
        required: true
        type: choice
        default: DO_NOT_RUN
        options:
          - DO_NOT_RUN
          - READINESS_ONLY
          - RUN_LLM_S01

permissions:
  contents: read

concurrency:
  group: live-llm-eval
  cancel-in-progress: false

jobs:
  foundation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LIVE_EVAL_ALLOWED: yes
      LIVE_LLM_EVAL_ALLOWED: yes
      LIVE_EVAL_TENANT_IDS: TENANT_LIVE_EVAL
      LIVE_EVAL_LLM_PROVIDER: openai
      LIVE_EVAL_LLM_MODEL: gpt-4o-mini
      LIVE_EVAL_LLM_TIMEOUT: "60"
      LIVE_EVAL_LLM_MAX_TOKENS: "2048"
      LIVE_EVAL_MAX_LLM_CALLS: "4"
      ADMIN_API_KEY: ci-admin-key
      BUILD_GIT_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: PostgreSQL service healthy
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 2
          done

      - name: Bootstrap PostgreSQL schema
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: python -m scripts.ci.bootstrap_postgres_schema

      - name: Verify integration_db test selection
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED_INTEGRATION_DB=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          if [ "${EXPECTED_INTEGRATION_DB}" != "30" ]; then
            echo "foundation integration_db gate requires exactly 30 selected tests, got ${EXPECTED_INTEGRATION_DB}" >&2
            exit 1
          fi
          ROOT_JOB=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_root_job_atomic_pg.py 2>/dev/null | awk '/ collected/ { print; exit }' | awk '{ split($1, parts, "/"); print parts[1] }')
          TELEMETRY=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_telemetry_idempotency_pg.py 2>/dev/null | awk '/ collected/ { print; exit }' | awk '{ split($1, parts, "/"); print parts[1] }')
          REGISTRY=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_registry_refresh_pg.py 2>/dev/null | awk '/ collected/ { print; exit }' | awk '{ split($1, parts, "/"); print parts[1] }')
          CLEANUP=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_cleanup_persistence_pg.py 2>/dev/null | awk '/ collected/ { print; exit }' | awk '{ split($1, parts, "/"); print parts[1] }')
          LLM_OPS=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_llm_operations_pg.py 2>/dev/null | awk '/ collected/ { print; exit }' | awk '{ split($1, parts, "/"); print parts[1] }')
          MIGRATION_021=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_live_eval_migration_021_pg.py 2>/dev/null | awk '/ collected/ { print; exit }' | awk '{ split($1, parts, "/"); print parts[1] }')
          if [ "${ROOT_JOB}" != "5" ] || [ "${TELEMETRY}" != "2" ] || [ "${REGISTRY}" != "1" ] || [ "${CLEANUP}" != "3" ] || [ "${LLM_OPS}" != "17" ] || [ "${MIGRATION_021}" != "2" ]; then
            echo "foundation integration_db composition must be 5+2+1+3+17+2, got ${ROOT_JOB}+${TELEMETRY}+${REGISTRY}+${CLEANUP}+${LLM_OPS}+${MIGRATION_021}" >&2
            exit 1
          fi

      - name: Run live-llm PostgreSQL integration_db tests
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          python -m pytest tests/evaluation/live \
            -m integration_db \
            -q \
            --tb=short \
            --junitxml=foundation_integration_db.junit.xml

      - name: Verify integration_db JUnit gate
        run: python scripts/ci/verify_pytest_junit.py foundation_integration_db.junit.xml --expected 30

      - name: Run live-llm hermetic tests
        env:
          ENV: test
          BUILD_GIT_SHA: ${{ github.sha }}
        run: python -m pytest tests/evaluation/live -m "not integration_db and not live_gmail_eval" -q --tb=short

      - name: Validate LLM config (offline)
        env:
          ENV: test
          BUILD_GIT_SHA: ${{ github.sha }}
        run: python scripts/run_live_eval.py llm-readiness-only --tenant-id TENANT_LIVE_EVAL

  operator-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Verify live LLM authorization
        run: |
          test "${GITHUB_REF}" = "refs/heads/main"
          case "${{ inputs.confirm_live_llm }}" in
            READINESS_ONLY|RUN_LLM_S01) ;;
            *) echo "confirm_live_llm must be READINESS_ONLY or RUN_LLM_S01"; exit 1 ;;
          esac

  live_llm_transport:
    runs-on: ubuntu-latest
    needs:
      - foundation
      - operator-gate
    timeout-minutes: 45
    environment: live-llm-eval

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test
      STORAGE_PATH: ${{ github.workspace }}/storage/ci-live-llm-eval
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
      LIVE_EVAL_ALLOWED: yes
      LIVE_LLM_EVAL_ALLOWED: yes
      LIVE_EVAL_TENANT_IDS: TENANT_LIVE_EVAL
      LIVE_EVAL_LLM_PROVIDER: openai
      LIVE_EVAL_LLM_MODEL: ${{ secrets.LIVE_EVAL_LLM_MODEL }}
      LIVE_EVAL_LLM_TIMEOUT: "60"
      LIVE_EVAL_LLM_MAX_TOKENS: "2048"
      LIVE_EVAL_MAX_LLM_CALLS: "4"
      ADMIN_API_KEY: ${{ secrets.LIVE_EVAL_ADMIN_API_KEY }}
      LIVE_EVAL_APP_BASE_URL: http://127.0.0.1:8010
      BUILD_GIT_SHA: ${{ github.sha }}
      LLM_API_KEY: ${{ secrets.LIVE_EVAL_LLM_API_KEY }}
      LLM_API_URL: ${{ secrets.LIVE_EVAL_LLM_API_URL }}
      LLM_MODEL: ${{ secrets.LIVE_EVAL_LLM_MODEL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: PostgreSQL health
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 2
          done

      - name: Bootstrap PostgreSQL schema
        run: python -m scripts.ci.bootstrap_postgres_schema

      - name: Seed eval tenant
        run: python scripts/seed_live_eval_tenant.py --tenant-id TENANT_LIVE_EVAL --apply

      - name: Start Krowolf app
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8010 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8010/health && break
            sleep 2
          done

      - name: Runtime readiness and BUILD_GIT_SHA
        run: |
          curl -sf -H "X-Admin-API-Key: $ADMIN_API_KEY" \
            "$LIVE_EVAL_APP_BASE_URL/admin/live-eval/runtime-readiness" | tee runtime.json
          python - <<'PY'
          import json, os, sys
          data = json.load(open("runtime.json"))
          assert data.get("env") == "test"
          assert data.get("build_git_sha") == os.environ.get("BUILD_GIT_SHA")
          PY

      - name: LLM readiness-only report
        id: readiness_report
        if: inputs.confirm_live_llm == 'READINESS_ONLY'
        run: |
          python scripts/run_live_eval.py llm-readiness-only \
            --tenant-id TENANT_LIVE_EVAL \
            --report-file "${RUNNER_TEMP}/llm_readiness_report.json"

      - name: Upload readiness artifact
        if: always() && inputs.confirm_live_llm == 'READINESS_ONLY'
        uses: actions/upload-artifact@v4
        with:
          name: live-llm-readiness-${{ github.sha }}
          path: ${{ runner.temp }}/llm_readiness_report.json

      - name: Live LLM S01 scenario
        id: run_llm
        if: inputs.confirm_live_llm == 'RUN_LLM_S01'
        run: |
          python scripts/run_live_eval.py run-llm-s01 \
            --scenario-id S01_lead_laddbox_quality \
            --tenant-id TENANT_LIVE_EVAL \
            --confirm-external \
            --run-id-file "${RUNNER_TEMP}/live_llm_run_id"

      - name: Resolve LLM artifact path
        if: always() && inputs.confirm_live_llm == 'RUN_LLM_S01'
        run: |
          if [ -f "${RUNNER_TEMP}/live_llm_run_id" ]; then
            RUN_ID=$(cat "${RUNNER_TEMP}/live_llm_run_id")
            ARTIFACT_DIR=$(python -c "from app.evaluation.live.paths import resolved_run_directory; print(resolved_run_directory('$RUN_ID'))")
            echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
            echo "RUN_ARTIFACT_DIR=$ARTIFACT_DIR" >> "$GITHUB_ENV"
          fi

      - name: Upload LLM artifacts
        if: always() && inputs.confirm_live_llm == 'RUN_LLM_S01' && env.RUN_ARTIFACT_DIR != ''
        uses: actions/upload-artifact@v4
        with:
          name: live-llm-report-${{ env.RUN_ID }}
          path: ${{ env.RUN_ARTIFACT_DIR }}/
          if-no-files-found: warn

      - name: Verify LLM artifacts present
        if: always() && inputs.confirm_live_llm == 'RUN_LLM_S01' && env.RUN_ID != ''
        run: |
          if [ ! -f "${RUN_ARTIFACT_DIR}/llm_report.json" ]; then
            echo "typed failure or infrastructure issue: llm_report.json missing at ${RUN_ARTIFACT_DIR}" >&2
            exit 1
          fi
