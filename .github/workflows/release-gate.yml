name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
      ENV: test
      ADMIN_API_KEY: ci-admin-key
      TENANT_API_KEYS: '{"TENANT_1001":"ci-tenant-key"}'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run evaluation harness smoke
        run: python -m scripts.run_eval_harness --smoke --fail-on-regression

      - name: Run release gate
        run: python scripts/run_release_gate_r1.py --verbose

      - name: Provision PostgreSQL eval database
        run: python scripts/ci/provision_eval_pg_database.py

      - name: Run PostgreSQL evaluation tests
        env:
          ENV: test
          EVAL_HARNESS_PG_ALLOWED: yes
          EVAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform_eval
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m pg_eval 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED_PG_EVAL=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          python -m pytest -m pg_eval -q --tb=short --junitxml=pg_eval.junit.xml
          python scripts/ci/verify_pytest_junit.py pg_eval.junit.xml --expected "${EXPECTED_PG_EVAL}"

      - name: Run full test suite
        run: python -m pytest -m "not monday_live"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test design contracts
        working-directory: frontend
        run: npm run test:contracts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [tests, frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        env:
          BUILD_COMMIT_SHA: ${{ github.sha }}
        run: |
          test ! -e storage
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RELEASE_ID="ci-${GITHUB_SHA::7}"
          docker build \
            --build-arg "BUILD_COMMIT_SHA=${BUILD_COMMIT_SHA}" \
            --build-arg "BUILD_TIME=${BUILD_TIME}" \
            --build-arg "RELEASE_ID=${RELEASE_ID}" \
            -t ai-automation-platform:ci .

      - name: Verify build metadata in image
        run: |
          docker run --rm ai-automation-platform:ci python -c "import json; d=json.load(open('/app/build-metadata.json')); assert d['schema_version']==1; assert d['commit_sha']; assert d['build_time']; assert d['release_id']"

      - name: Validate production compose config
        run: |
          cat > .env.production <<'EOF'
          POSTGRES_PASSWORD=ci-postgres-password
          EOF
          docker compose -f docker-compose.prod.yml config

      - name: Verify runtime storage bootstrap and health
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ai_platform
        run: |
          chmod +x scripts/ci/docker_runtime_health_check.sh
          scripts/ci/docker_runtime_health_check.sh ai-automation-platform:ci

      - name: Cleanup docker verification resources
        if: always()
        run: |
          docker rm -f ai-platform-ci-health >/dev/null 2>&1 || true
          docker image prune -f >/dev/null 2>&1 || true
