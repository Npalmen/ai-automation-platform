name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
      ENV: test
      ADMIN_API_KEY: ci-admin-key
      TENANT_API_KEYS: '{"TENANT_1001":"ci-tenant-key"}'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run release gate
        run: python scripts/run_release_gate_r1.py --verbose

      - name: Run full test suite
        run: python -m pytest

  docker:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t ai-automation-platform:ci .

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config
