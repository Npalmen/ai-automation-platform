name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
      ENV: test
      ADMIN_API_KEY: ci-admin-key
      TENANT_API_KEYS: '{"TENANT_1001":"ci-tenant-key"}'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run evaluation harness smoke
        run: python -m scripts.run_eval_harness --smoke --fail-on-regression

      - name: Run release gate
        run: python -m scripts.run_release_gate_r1 --verbose

      - name: Provision PostgreSQL eval database
        run: python scripts/ci/provision_eval_pg_database.py

      - name: Run PostgreSQL evaluation tests
        env:
          ENV: test
          EVAL_HARNESS_PG_ALLOWED: yes
          EVAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform_eval
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m pg_eval 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED_PG_EVAL=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          python -m pytest -m pg_eval -q --tb=short --junitxml=pg_eval.junit.xml
          python scripts/ci/verify_pytest_junit.py pg_eval.junit.xml --expected "${EXPECTED_PG_EVAL}"

      - name: Run full test suite
        run: python -m pytest -m "not monday_live and not live_gmail_eval and not live_llm_eval and not live_e2e_eval and not integration_db"

  live-eval-postgres:
    name: Live eval PostgreSQL (integration_db)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Bootstrap PostgreSQL schema
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: python -m scripts.ci.bootstrap_postgres_schema

      - name: Run live-eval integration_db PostgreSQL tests
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_root_job_atomic_pg.py 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED_INTEGRATION_DB=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          if [ "${EXPECTED_INTEGRATION_DB}" != "5" ]; then
            echo "integration_db gate requires exactly 5 selected tests, got ${EXPECTED_INTEGRATION_DB}" >&2
            exit 1
          fi
          python -m pytest tests/evaluation/live/test_root_job_atomic_pg.py -m integration_db -q --tb=short --junitxml=live_eval_integration_db.junit.xml
          python scripts/ci/verify_pytest_junit.py live_eval_integration_db.junit.xml --expected 5

      - name: Run migration 016 PostgreSQL integration test
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          python -m pytest tests/test_integration_selection_migration_016.py::test_postgres_migration_016_table_when_database_available \
            -q --tb=short --junitxml=migration_016_integration_db.junit.xml
          python scripts/ci/verify_pytest_junit.py migration_016_integration_db.junit.xml --expected 1

      - name: Run live-eval repository PG contract tests
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_telemetry_idempotency_pg.py 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          if [ "${EXPECTED}" != "2" ]; then
            echo "telemetry idempotency gate requires exactly 2 selected tests, got ${EXPECTED}" >&2
            exit 1
          fi
          python -m pytest tests/evaluation/live/test_telemetry_idempotency_pg.py -m integration_db -q --tb=short --junitxml=live_eval_telemetry_idempotency_pg.junit.xml
          python scripts/ci/verify_pytest_junit.py live_eval_telemetry_idempotency_pg.junit.xml --expected 2

      - name: Run live-eval registry refresh PG contract test
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_registry_refresh_pg.py 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          if [ "${EXPECTED}" != "1" ]; then
            echo "registry refresh gate requires exactly 1 selected test, got ${EXPECTED}" >&2
            exit 1
          fi
          python -m pytest tests/evaluation/live/test_registry_refresh_pg.py -m integration_db -q --tb=short --junitxml=live_eval_registry_refresh_pg.junit.xml
          python scripts/ci/verify_pytest_junit.py live_eval_registry_refresh_pg.junit.xml --expected 1

      - name: Run live-llm operation PG contract tests
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_platform
        run: |
          COLLECT_LINE=$(python -m pytest --collect-only -q -m integration_db tests/evaluation/live/test_llm_operations_pg.py 2>/dev/null | awk '/ collected/ { print; exit }')
          EXPECTED=$(echo "${COLLECT_LINE}" | awk '{ split($1, parts, "/"); print parts[1] }')
          if [ "${EXPECTED}" != "17" ]; then
            echo "live-llm operations gate requires exactly 17 selected tests, got ${EXPECTED}" >&2
            exit 1
          fi
          python -m pytest tests/evaluation/live/test_llm_operations_pg.py -m integration_db -q --tb=short --junitxml=live_eval_llm_operations_pg.junit.xml
          python scripts/ci/verify_pytest_junit.py live_eval_llm_operations_pg.junit.xml --expected 17

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test design contracts
        working-directory: frontend
        run: npm run test:contracts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [tests, live-eval-postgres, frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        env:
          BUILD_COMMIT_SHA: ${{ github.sha }}
        run: |
          test ! -e storage
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RELEASE_ID="ci-${GITHUB_SHA::7}"
          docker build \
            --build-arg "BUILD_COMMIT_SHA=${BUILD_COMMIT_SHA}" \
            --build-arg "BUILD_TIME=${BUILD_TIME}" \
            --build-arg "RELEASE_ID=${RELEASE_ID}" \
            -t ai-automation-platform:ci .

      - name: Verify build metadata in image
        run: |
          docker run --rm ai-automation-platform:ci python -c "import json; d=json.load(open('/app/build-metadata.json')); assert d['schema_version']==1; assert d['commit_sha']; assert d['build_time']; assert d['release_id']"

      - name: Validate production compose config
        run: |
          cat > .env.production <<'EOF'
          POSTGRES_PASSWORD=ci-postgres-password
          EOF
          docker compose -f docker-compose.prod.yml config

      - name: Verify runtime storage bootstrap and health
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ai_platform
        run: |
          chmod +x scripts/ci/docker_runtime_health_check.sh
          scripts/ci/docker_runtime_health_check.sh ai-automation-platform:ci

      - name: Cleanup docker verification resources
        if: always()
        run: |
          docker rm -f ai-platform-ci-health >/dev/null 2>&1 || true
          docker image prune -f >/dev/null 2>&1 || true
